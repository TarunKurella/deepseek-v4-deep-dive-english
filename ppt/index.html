<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {

  iframe {

  .counter {

    font-size: 13px;
    z-index: 100;
    opacity: 0.85;
  }
  .counter .label { color: rgba(255,255,255,0.7); margin-left: 8px; }
  .nav-zone {
    position: fixed;
    top: 0; bottom: 0;
    width: 12%;
    cursor: pointer;
    z-index: 50;
  }
  .nav-zone.left { left: 0; }
  .nav-zone.right { right: 0; }
  .nav-hint {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .nav-zone.left .nav-hint { left: 20px; }
  .nav-zone.right .nav-hint { right: 20px; }
  .nav-zone:hover .nav-hint { opacity: 1; }
  .toc-toggle {
    position: fixed;
    top: 20px; left: 20px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    cursor: pointer;
    z-index: 120;
  }
  .toc-panel {
    position: fixed;
    top: 0; left: -360px; bottom: 0;
    width: 340px;
    background: #0f0f0f;
    border-right: 1px solid rgba(255,255,255,0.1);
    transition: left 0.25s ease;
    z-index: 110;
    overflow-y: auto;
    padding: 56px 0 20px;
    color: #ddd;
  }
  .toc-panel.open { left: 0; }
  .toc-item {
    padding: 8px 20px;
    font-size: 12px;
    line-height: 1.4;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    border-left: 2px solid transparent;
  }
  .toc-item:hover { color: #fff; background: rgba(255,255,255,0.04); }
  .toc-item.active { color: #4D6BFE; border-left-color: #4D6BFE; }
  .notice {
    position: fixed;
    top: 20px; right: 20px;
    max-width: 360px;
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.82);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 12px 14px;
    border-radius: 14px;
    font-size: 12px;
    line-height: 1.5;
    z-index: 140;
  }
</style>

<body>
  <div class="notice">
    English-only deck edition.
    Full translated slide set, 00-72.
  </div>
  <div class="toc-toggle" id="tocToggle">TOC</div>
  <div class="toc-panel" id="tocPanel"></div>
  <div class="nav-zone left" id="navL"><div class="nav-hint">‹</div></div>
  <div class="nav-zone right" id="navR"><div class="nav-hint">›</div></div>
  <div id="stage"><iframe id="frame" title="DeepSeek-V4 English Deck"></iframe></div>
  <div class="counter" id="counter"></div>

<script>
  const deck = window.DECK_MANIFEST;
  const stage = document.getElementById('stage');
  const frame = document.getElementById('frame');
  const counter = document.getElementById('counter');
  const tocPanel = document.getElementById('tocPanel');
  const tocToggle = document.getElementById('tocToggle');
  let current = 0;

  function resize() {
    const scale = Math.min(window.innerWidth / window.DECK_WIDTH, window.innerHeight / window.DECK_HEIGHT);
    stage.style.width = `${window.DECK_WIDTH}px`;
    stage.style.height = `${window.DECK_HEIGHT}px`;
    stage.style.transform = `translate(-50%, -50%) scale(${scale})`;
  }

  function renderCounter() {
    counter.innerHTML = `${current + 1} / ${deck.length} <span class="label">${deck[current].label}</span>`;
  }

  function renderTOC() {
    tocPanel.innerHTML = '';
    deck.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = `toc-item${i === current ? ' active' : ''}`;
      el.textContent = item.label;
      el.addEventListener('click', () => {
        show(i);
        tocPanel.classList.remove('open');
      });
      tocPanel.appendChild(el);
    });
  }

  function show(i) {
    current = Math.max(0, Math.min(deck.length - 1, i));
    frame.src = deck[current].file;
    renderCounter();
    renderTOC();
  }

  function prev() { show(current - 1); }
  function next() { show(current + 1); }

  document.getElementById('navL').addEventListener('click', prev);
  document.getElementById('navR').addEventListener('click', next);
  tocToggle.addEventListener('click', () => tocPanel.classList.toggle('open'));
  window.addEventListener('resize', resize);
  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') prev();
    if (e.key === 'ArrowRight') next();
    if (e.key.toLowerCase() === 'i') tocPanel.classList.toggle('open');
  });

  resize();
  show(0);
</script>
</body>
